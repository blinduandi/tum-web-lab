<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pagebound</title>
    <script>
      // GitHub Pages serves 404.html for any unknown path. Pagebound is a
      // single-page app, so just bounce the visitor to the root and let
      // the SPA take over.
      var base = "/pagebound/";
      var target = base + window.location.search + window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body></body>
</html>
